name: AI Service CI

on:
  push:
    paths:
      - 'ai-service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: cd ai-service && pip install -r requirements.txt
      - name: Run tests
        run: cd ai-service && pytest
