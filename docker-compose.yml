version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: aistock
      POSTGRES_USER: aistock
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aistock
      SPRING_DATASOURCE_USERNAME: aistock
      SPRING_DATASOURCE_PASSWORD: secret

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      BACKEND_URL: http://backend:8080/api/ai/signal
      AI_API_KEY: your-secret-key
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
